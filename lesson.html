<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buổi học — HR Builder VN</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style-v2.css">
<style>
.principle-banner { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a8a 100%); border-radius: var(--radius-lg); padding: 24px 28px; margin-bottom: 20px; color: white; position: relative; overflow: hidden; }
.principle-banner::before { content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(168, 85, 247, 0.35) 0%, transparent 70%); border-radius: 50%; }
.principle-banner::after { content: ''; position: absolute; bottom: -30%; left: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(236, 72, 153, 0.3) 0%, transparent 70%); border-radius: 50%; }
.principle-content { position: relative; z-index: 2; }
.principle-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 14px; }
.mystery-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.25; margin-bottom: 8px; background: linear-gradient(135deg, #fff 0%, #fbbf24 50%, #f97316 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.mystery-sub { font-size: 14px; opacity: 0.85; max-width: 680px; margin-bottom: 18px; line-height: 1.55; }
.hints-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.hint-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius-sm); padding: 12px 14px; transition: all 0.3s; }
.hint-card.unlocked { background: rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.4); }
.hint-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; opacity: 0.75; }
.hint-card.unlocked .hint-num { color: #fbbf24; opacity: 1; }
.hint-text { font-size: 13px; font-weight: 500; line-height: 1.4; font-style: italic; }
.hint-card.locked .hint-text { opacity: 0.5; font-style: normal; font-size: 11.5px; }
.principle-banner.revealed .mystery-title { display: none; }
.principle-banner.revealed .mystery-sub { display: none; }
.reveal-name { display: none; font-size: 32px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg, #fff 0%, #fbbf24 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.principle-banner.revealed .reveal-name { display: block; }
.reveal-msg { display: none; font-size: 14px; opacity: 0.9; max-width: 680px; line-height: 1.55; margin-bottom: 14px; }
.principle-banner.revealed .reveal-msg { display: block; }
.principle-progress { display: flex; gap: 4px; margin-top: 18px; }
.pdot { width: 30px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.15); }
.pdot.done { background: var(--accent); }
.pdot.active { background: white; }
.principle-progress-label { font-size: 12px; opacity: 0.8; margin-top: 8px; }

.quiz-strip { display: flex; align-items: center; gap: 14px; padding: 14px 20px; background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%); border: 1px solid #c4b5fd; border-radius: var(--radius); margin-bottom: 20px; }
.quiz-strip.empty { background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); border-color: var(--border-strong); }
.quiz-icon { font-size: 24px; flex-shrink: 0; }
.quiz-text { display: flex; flex-direction: column; gap: 2px; }
.quiz-text strong { font-size: 13px; color: #5b21b6; font-weight: 700; }
.quiz-strip.empty .quiz-text strong { color: var(--text-muted); }
.quiz-text span { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }

.personalize-banner { background: linear-gradient(135deg, var(--accent-soft), #fef3c7); border: 1px solid #fed7aa; border-radius: var(--radius); padding: 12px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; }
.personalize-banner .pb-icon { font-size: 20px; flex-shrink: 0; }
.personalize-banner strong { color: #9a3412; }

.lan-voice { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-left: 4px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; padding: 16px 20px; margin: 20px 0; display: flex; gap: 14px; align-items: start; }
.lan-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.lan-content { flex: 1; }
.lan-name { font-size: 12px; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
.lan-msg { font-size: 14.5px; color: #78350f; line-height: 1.6; }
.lan-msg em { font-style: normal; font-weight: 600; color: #9a3412; }

.deep-dive { background: var(--surface); border: 2px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 22px 26px; margin-bottom: 24px; transition: all 0.4s; }
.deep-dive.locked { opacity: 0.6; }
.deep-dive.unlocked { border: 2px solid var(--purple); background: linear-gradient(135deg, #faf5ff 0%, #fdf4ff 100%); opacity: 1; }
.dd-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.dd-icon-wrap { width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.deep-dive.unlocked .dd-icon-wrap { background: linear-gradient(135deg, var(--purple), var(--primary)); color: white; }
.dd-header h3 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.dd-header p { font-size: 13px; color: var(--text-muted); }
.dd-layers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.dd-layer { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.deep-dive.unlocked .dd-layer { border-color: rgba(139, 92, 246, 0.3); }
.dd-layer-num { display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; color: var(--purple); background: var(--purple-soft); padding: 3px 8px; border-radius: 100px; margin-bottom: 8px; }
.deep-dive.locked .dd-layer-num { color: var(--text-muted); background: var(--surface-3); }
.dd-layer-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.deep-dive.locked .dd-layer-title { color: var(--text-light); }
.dd-layer-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

.step-num-badge { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--primary-soft), #ede9fe); color: var(--primary-dark); padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 800; letter-spacing: 0.4px; }

/* Capstone picker (Lớp 10) */
.capstone-picker { background: linear-gradient(135deg, #fef3c7 0%, #fff7ed 100%); border: 2px solid #fbbf24; border-radius: 16px; padding: 24px 28px; margin-bottom: 24px; }
.capstone-picker h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; color: #78350f; }
.capstone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
.capstone-card { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: all 0.2s; position: relative; }
.capstone-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(249, 115, 22, 0.15); transform: translateY(-2px); }
.capstone-card.recommended { border-color: var(--accent); background: linear-gradient(135deg, white 0%, #fff7ed 100%); }
.capstone-card.selected { border-color: var(--success); background: linear-gradient(135deg, white 0%, var(--success-soft) 100%); }
.capstone-card.selected::after { content: '✓ Đã chọn'; position: absolute; top: 10px; right: 12px; background: var(--success); color: white; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
.cap-tag { display: inline-block; background: var(--accent); color: white; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.cap-icon { font-size: 28px; margin-bottom: 8px; }
.cap-name { font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; color: var(--text); }
.cap-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.cap-scope { font-size: 11.5px; color: var(--purple); font-weight: 600; margin-bottom: 10px; }
.cap-pick-btn { background: var(--surface-2); color: var(--primary); border: 1px solid var(--border-strong); padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px; width: 100%; cursor: pointer; }
.capstone-card:hover .cap-pick-btn { background: var(--primary); color: white; border-color: var(--primary); }

@media (max-width: 768px) { .hints-row { grid-template-columns: 1fr; } .dd-layers { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <a href="index.html" style="color: inherit; text-decoration: none;">HR Builder VN</a>
    <span class="badge">CỘT MỐC #1</span>
  </div>
  <nav>
    <a href="index.html" class="active">Lớp học</a>
    <a href="settings.html">Cài đặt</a>
  </nav>
  <div class="user">
    <span class="streak" id="streakDisplay">🔥 0 ngày</span>
    <span class="xp" id="xpDisplay">⚡ 0 XP</span>
    <div class="avatar" id="userAvatar">?</div>
  </div>
</header>

<div class="lesson-wrap" id="lessonRoot">
  <!-- Render bằng JS -->
</div>

<!-- Help drawer -->
<div class="help-drawer" id="helpDrawer">
  <div class="help-header">
    <div class="ai-avatar-mini">🤖</div>
    <div>
      <div class="help-title">Bạn đồng hành</div>
      <div class="help-subtitle">Online · luôn ngồi cạnh bạn</div>
    </div>
    <button class="close-help" onclick="closeHelp()">×</button>
  </div>
  <div class="help-messages">
    <div class="help-msg bot">
      <p>Chào anh chị 👋 Anh chị đang vướng chỗ nào? Click một cái dưới, hoặc cứ gõ tự do — tôi đang nghe đây.</p>
    </div>
    <div class="help-quick" id="helpQuick"></div>
  </div>
  <div class="help-input">
    <textarea placeholder="Anh chị hỏi tôi mà…" rows="2"></textarea>
    <button>↑</button>
  </div>
</div>

<div class="live-notif-stack" id="liveNotifs"></div>

<script type="module" src="firebase-client.js"></script>
<script src="lessons-data.js"></script>
<script src="ai-client.js"></script>
<script src="progress.js"></script>
<script src="onboarding.js"></script>
<script type="module" src="auth-ui.js"></script>
<script>
// Đọc ID buổi từ URL: ?id=2
const urlParams = new URLSearchParams(window.location.search);
const lessonId = parseInt(urlParams.get('id') || '1');
const lesson = LESSONS[lessonId];

// Kiểm tra onboarding
if (!isOnboarded()) {
  showOnboardingModal();
}

// Kiểm tra lesson tồn tại trước (tránh hiện "Buổi 98 đang khoá" khi ?id=99)
if (!lesson) {
  document.getElementById('lessonRoot').innerHTML = `
    <a href="index.html" class="back-link">← Về lớp học</a>
    <div style="text-align: center; padding: 80px 20px; background: white; border-radius: 16px; margin-top: 20px;">
      <div style="font-size: 60px; margin-bottom: 16px;">🤷</div>
      <h1 style="font-size: 24px; margin-bottom: 12px;">Buổi ${lessonId}? Tôi tìm không thấy đâu cả.</h1>
      <p style="color: var(--text-muted); margin-bottom: 24px;">Khóa hiện có Buổi 1-15. Anh chị nhập sai số, hoặc link cũ rồi.</p>
      <a href="index.html" class="btn-primary" style="padding: 12px 28px; border-radius: 8px;">← Về lớp học</a>
    </div>
  `;
} else if (!isLessonUnlocked(lessonId)) {
  document.getElementById('lessonRoot').innerHTML = `
    <a href="index.html" class="back-link">← Về lớp học</a>
    <div style="text-align: center; padding: 80px 20px; background: white; border-radius: 16px; margin-top: 20px;">
      <div style="font-size: 60px; margin-bottom: 16px;">🔒</div>
      <h1 style="font-size: 24px; margin-bottom: 12px;">Buổi ${lessonId} chưa mở</h1>
      <p style="color: var(--text-muted); margin-bottom: 24px;">Anh chị cần xong Buổi ${lessonId - 1} (đủ năm bước) thì Buổi này mới mở. Quy luật, không phải tôi đặt.</p>
      <a href="lesson.html?id=${lessonId - 1}" class="btn-primary" style="padding: 12px 28px; border-radius: 8px;">→ Đi tới Buổi ${lessonId - 1}</a>
    </div>
  `;
} else {
  // Buổi 1-3 free cho mọi người. Buổi 4+ chỉ cohort member (đã trả 9.9M)
  if (lessonId >= 4) {
    // Wait fb-ready, check cohort membership
    document.addEventListener('fb-ready', async () => {
      const isCohort = window.fb && window.fb.currentUser?.()
        ? await window.fb.isCohortMember()
        : false;
      if (!isCohort) {
        document.getElementById('lessonRoot').innerHTML = `
          <a href="index.html" class="back-link">← Về lớp học</a>
          <div style="text-align: center; padding: 60px 30px; background: white; border-radius: 16px; margin-top: 20px; max-width: 640px; margin-left: auto; margin-right: auto;">
            <div style="font-size: 60px; margin-bottom: 16px;">🎓</div>
            <h1 style="font-size: 26px; margin-bottom: 14px; letter-spacing: -0.4px;">Buổi ${lessonId} dành cho cohort thành viên</h1>
            <p style="color: var(--text-muted); margin-bottom: 8px; line-height: 1.6;">Buổi 1, 2, 3 thì free. Từ Buổi 4 trở đi mình bàn việc nặng — anh chị cần là thành viên cohort chính thức.</p>
            <p style="color: var(--text-muted); margin-bottom: 24px; line-height: 1.6;">Cohort 9,9 triệu một người, mười tuần. Hoàn 5 triệu nếu pass mốc Tuần 4.</p>
            <div style="background: #f8fafc; border-radius: 12px; padding: 18px 22px; margin-bottom: 24px; text-align: left; font-size: 14px;">
              <div style="font-weight: 700; margin-bottom: 8px;">📋 Anh chị cần làm:</div>
              <ol style="margin: 0; padding-left: 20px; color: #475569; line-height: 1.7;">
                <li>Đóng học phí 9,9 triệu (chuyển khoản — anh Lân gửi info)</li>
                <li>anh Lân add anh chị vào cohort trong 24h</li>
                <li>Đăng nhập lại — cả 15 buổi mở khóa luôn</li>
              </ol>
            </div>
            <a href="https://zalo.me/" class="btn-primary" style="padding: 12px 28px; border-radius: 8px; text-decoration: none;">💬 Nhắn anh Lân trên Zalo</a>
            <a href="lesson.html?id=3" style="margin-left: 12px; padding: 12px 20px; color: var(--text-muted); text-decoration: none;">← Quay lại Buổi 3 (free)</a>
          </div>
        `;
        return;
      }
      // Là cohort → render bình thường
      renderLesson(lesson, lessonId);
      loadChatHistory();
      updateXpDisplay();
    }, { once: true });
    // Render placeholder loading trong khi chờ check
    document.getElementById('lessonRoot').innerHTML = `
      <div style="text-align: center; padding: 80px; color: var(--text-muted);">
        <div style="font-size: 30px;">⏳</div>
        <p style="margin-top: 12px;">Đang kiểm tra quyền truy cập…</p>
      </div>
    `;
  } else {
    renderLesson(lesson, lessonId);
    loadChatHistory();
    updateXpDisplay();
  }
}

// Capstone picker UI cho Lớp 10
function capstonePicker() {
  const profile = getProfile();
  const userArea = profile?.area || '';

  const capstones = [
    { id: 'TA', icon: '🎯', name: 'TA — Sourcing Pipeline + Interview Scheduler', desc: 'Tự sourcing LinkedIn/TopCV/GitHub → outreach personalized → đặt lịch PV. Tiết kiệm 15-20 giờ/tuần.', match: ['TA'], scope: 'Khả thi một tuần' },
    { id: 'CB', icon: '💰', name: 'C&B — Payroll Auditor + BHXH Advisor', desc: 'Đối chiếu Payroll vs BHXH vs Thuế TNCN. Flag sai sót. Tránh phạt + tiết kiệm 10-15 giờ/tháng.', match: ['C&B'], scope: 'Khả thi một tuần · cần data sandbox' },
    { id: 'LD', icon: '📚', name: 'L&D — Learning Path + Microlearning Bot', desc: 'Sinh lộ trình sáu tháng cá nhân hóa. Push Zalo daily năm phút lesson. Completion rate gấp hai gấp ba.', match: ['L&D'], scope: 'Khả thi một tuần' },
    { id: 'HRBP', icon: '📊', name: 'HRBP — Engagement Sentiment Dashboard', desc: 'Đọc pulse + Slack/Zalo public → cảnh báo nguy cơ nghỉ việc 3-6 tháng trước.', match: ['HRBP'], scope: 'Khả thi một tuần' },
    { id: 'Ops', icon: '⚙️', name: 'HR Ops — Document Search + Leave Approver', desc: 'Helpdesk Q&A 24/7 + tự duyệt đơn nghỉ phép qua API Routine. Giảm 60% ticket — đỡ một ngàn câu hỏi.', match: ['Ops'], scope: 'Khả thi một tuần' },
  ];

  const cards = capstones.map(c => {
    const isMatched = c.match.includes(userArea);
    return `
      <div class="capstone-card ${isMatched ? 'recommended' : ''}" onclick="pickCapstone('${c.id}', '${c.name.replace(/'/g, "\\'")}')">
        ${isMatched ? '<div class="cap-tag">⭐ Đề xuất cho bạn (mảng ' + userArea + ')</div>' : ''}
        <div class="cap-icon">${c.icon}</div>
        <div class="cap-name">${c.name}</div>
        <div class="cap-desc">${c.desc}</div>
        <div class="cap-scope">📐 ${c.scope}</div>
        <button class="cap-pick-btn">Chọn capstone này →</button>
      </div>
    `;
  }).join('');

  return `
    <div class="capstone-picker">
      <h2>🏆 Chọn Capstone Tự Do — bài HR riêng công ty anh chị</h2>
      <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Năm lựa chọn theo mảng. <strong>Tôi xin được nói thẳng:</strong> capstone tốt nhất là bài CHÍNH anh chị đang đau, không phải bài generic. Mentor sẽ giúp anh chị scope cho vừa một tuần — không tham, không sa lầy.</p>
      <div class="capstone-grid">${cards}</div>
      <div style="margin-top: 16px; padding: 14px 18px; background: var(--surface-2); border-radius: 8px; font-size: 13.5px; line-height: 1.6;">
        <strong>💭 Có bài HR khác ngoài năm cái này không?</strong> Click nút "Bí? Hỏi Bạn đồng hành" → mô tả bài bạn muốn → Mentor sẽ giúp scope + spec chín nguyên lý cho bài đó.
      </div>
    </div>
  `;
}

function pickCapstone(id, name) {
  const p = getProgress();
  if (!p.capstone) p.capstone = {};
  p.capstone.chosen = id;
  p.capstone.name = name;
  p.capstone.pickedAt = new Date().toISOString();
  saveProgress(p);
  showNotif(`🎯 Đã chọn capstone: ${id}. Bạn kéo xuống Bước 1 bắt đầu spec.`, '#10b981');
  document.querySelectorAll('.capstone-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function updateXpDisplay() {
  const stats = getOverallStats();
  const el = document.getElementById('xpDisplay');
  if (el) el.textContent = `⚡ ${stats.totalXp} XP`;
  const streakEl = document.getElementById('streakDisplay');
  if (streakEl) streakEl.textContent = `🔥 ${stats.streak} ngày`;
  // Avatar
  const profile = getProfile();
  const ava = document.getElementById('userAvatar');
  if (ava && profile) {
    const initials = profile.name.split(' ').map(w => w[0]).join('').slice(-2).toUpperCase();
    ava.textContent = initials;
  }
}

function renderLesson(l, id) {
  const prevId = id - 1;
  const nextId = id + 1;
  const prevLesson = LESSONS[prevId];

  const quizStrip = id === 1
    ? `<div class="quiz-strip empty"><div class="quiz-icon">🧠</div><div class="quiz-text"><strong>Quiz 30 giây ôn bài cũ</strong><span>Chưa có — đây là buổi đầu. Từ Buổi 3 trở đi, mỗi buổi mở đầu tôi sẽ quiz lại tư duy hai buổi trước.</span></div></div>`
    : id === 2
    ? `<div class="quiz-strip empty"><div class="quiz-icon">🧠</div><div class="quiz-text"><strong>Quiz 30 giây ôn bài cũ</strong><span>Chưa có đâu — Buổi 3 mới bắt đầu có quiz.</span></div></div>`
    : `<div class="quiz-strip"><div class="quiz-icon">🧠</div><div class="quiz-text"><strong>Quiz 30 giây — nhớ lại tư duy đã học</strong><span>Anh chị còn nhớ "<strong>${LESSONS[id-2]?.principle.name || ''}</strong>" (buổi ${id-2}) không? Click làm quiz nhanh đã, rồi mới vào buổi mới.</span></div></div>`;

// === SUBMISSION + UPLOAD IMAGES ===
let _stepImages = []; // base64 array

// Nén ảnh xuống ~700KB max bằng canvas resize + JPEG quality
function compressImage(file, maxBytes = 700000) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const maxSide = 1600;
        if (width > maxSide || height > maxSide) {
          if (width > height) { height = Math.round(height * maxSide / width); width = maxSide; }
          else { width = Math.round(width * maxSide / height); height = maxSide; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // Thử quality giảm dần để fit dưới maxBytes
        let quality = 0.85;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > maxBytes * 1.37 && quality > 0.4) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageUpload(event) {
  const files = Array.from(event.target.files || []);
  if (!files.length) return;
  if (_stepImages.length + files.length > 3) {
    showNotif('Tối đa 3 ảnh thôi anh chị, chọn ảnh tinh hoa nhất.', '#f59e0b');
    return;
  }
  showNotif('📷 Em đang nén ảnh...', '#2563eb');
  for (const f of files) {
    try {
      const dataUrl = await compressImage(f);
      _stepImages.push(dataUrl);
    } catch (e) {
      showNotif('Ảnh ' + f.name + ' bị lỗi, anh chị thử ảnh khác.', '#ef4444');
    }
  }
  renderImagePreviews();
  event.target.value = ''; // reset input để có thể chọn lại cùng file
}

function renderImagePreviews() {
  const c = document.getElementById('imagePreviews');
  if (!c) return;
  c.innerHTML = _stepImages.map((src, i) => `
    <div style="position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0;">
      <img src="${src}" style="width: 100%; height: 100%; object-fit: cover;">
      <button onclick="removeStepImage(${i})" style="position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.65); color: white; border: none; cursor: pointer; font-size: 14px; line-height: 1;">×</button>
    </div>
  `).join('');
}

function removeStepImage(idx) {
  _stepImages.splice(idx, 1);
  renderImagePreviews();
}
window.removeStepImage = removeStepImage;
window.handleImageUpload = handleImageUpload;

        <div style="font-weight: 700; color: #1e40af; font-size: 14px; margin-bottom: 6px;">📬 Bài đã gửi!</div>
        <div style="font-size: 13px; color: #1e3a8a; line-height: 1.6;">
          Anh Lân + bộ máy chấm bài đang xem giúp anh chị. Có kết quả sẽ hiện ở đây liền — anh chị cứ uống ngụm trà rồi quay lại sau ít phút. Trang này tự cập nhật, không cần F5.
        </div>
      `;
    }
    btns.forEach(b => { b.disabled = true; b.textContent = '⏳ Đang chờ chấm…'; });

    // Listen real-time: khi worker/admin chấm xong → hiện kết quả
    if (window._unsubSub) window._unsubSub();
    window._unsubSub = window.fb.listenMySubmission(lessonId, idx, (sub) => {
      if (!sub) return;
      if (sub.status === 'pending') return;
      // Đợi gradeResult về cùng status terminal — tránh race condition render
      // nửa vời rồi hiển thị "Chưa đạt" giả khi gradeResult chưa kịp set.
      if (!sub.gradeResult) return;

      const result = sub.gradeResult;
      // Ẩn statusEl "Bài đã gửi" — tránh chồng 2 box mâu thuẫn (statusEl giữ
      // text cũ + box grade-result-box mới hiển thị cùng lúc).
      if (statusEl) statusEl.style.display = 'none';
      showGradeResult(idx, result, step.xp);
      if (result.status === 'pass' || result.status === 'borderline') {
        markStepDone(lessonId, idx, result);
        confetti();
        showNotif(`🎉 ${result.status === 'pass' ? 'Đạt' : 'Đạt điều kiện'}! +${step.xp} XP. Bước tiếp mở rồi.`, '#10b981');
        updateXpDisplay();
        setTimeout(() => location.reload(), 3500);
      } else {
        // fail → cho nộp lại (KHÔNG dùng statusEl nữa, đã hide; box grade-result-box đã hiển thị "Chưa đạt" với feedback chi tiết rồi)
        btns.forEach(b => { b.disabled = false; b.textContent = `Nộp lại · +${step.xp} XP`; });
      }
    });
  } catch (err) {
    showNotif('❌ Lỗi gửi bài: ' + (err.message || 'không rõ').slice(0, 120), '#ef4444');
    btns.forEach(b => { b.disabled = false; b.textContent = `Nộp lại · +${lesson.steps[idx].xp} XP`; });
  }
}

function showGradeResult(idx, result, xp) {
  const inputWrap = document.querySelector('.task-input-wrap');
  if (!inputWrap) return;

  const colorMap = { pass: '#10b981', borderline: '#f59e0b', fail: '#ef4444' };
  const labelMap = { pass: '✅ Đạt', borderline: '⚠️ Đạt điều kiện (anh Lân sẽ xem lại)', fail: '❌ Chưa đạt' };

  // Normalise — AI có thể dùng tên field khác nhau, tự map về 1 chuẩn
  const status = ['pass','borderline','fail'].includes(result.status) ? result.status : 'fail';
  const color = colorMap[status];
  const label = labelMap[status];
  const score = (result.score != null) ? result.score : '—';
  const strengths = result.strengths || result.whatWorked || result.diem_tot || [];
  const improvements = result.improvements || result.improve || result.can_cai_thien || [];
  const summary = result.summary || result.next_step_hint || result.feedback || '';

  // Đã có sẵn 1 box rồi (khi nộp lại) → xoá đi
  inputWrap.querySelectorAll('.grade-result-box').forEach(el => el.remove());

  const html = `
    <div class="grade-result-box" style="margin-top: 16px; padding: 18px 20px; border-radius: 12px; border-left: 4px solid ${color}; background: ${color}15;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <div style="font-size: 16px; font-weight: 700; color: ${color};">${label}</div>
        <div style="font-size: 24px; font-weight: 800; color: ${color};">${score}/100</div>
      </div>
      ${summary ? `<div style="margin-bottom: 12px; font-size: 14px; line-height: 1.6; font-style: italic; color: #374151;">${renderMarkdown(summary)}</div>` : ''}
      ${strengths.length ? `<div style="margin-bottom: 10px;"><strong style="font-size: 13px;">💪 Anh chị làm tốt:</strong><ul style="margin-left: 20px; font-size: 14px; line-height: 1.6;">${strengths.map(s => `<li>${renderMarkdown(s)}</li>`).join('')}</ul></div>` : ''}
      ${improvements.length ? `<div style="margin-bottom: 0;"><strong style="font-size: 13px;">🔧 Lần tới cải thiện thêm:</strong><ul style="margin-left: 20px; font-size: 14px; line-height: 1.6;">${improvements.map(i => `<li>${renderMarkdown(i)}</li>`).join('')}</ul></div>` : ''}
    </div>
  `;
  inputWrap.insertAdjacentHTML('beforeend', html);
}

function copyPrompt(btn) {
  const pre = btn.closest('.prompt-box').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const old = btn.innerHTML;
    btn.innerHTML = '✅ Đã copy';
    setTimeout(() => btn.innerHTML = old, 1500);
  }).catch(() => {
    btn.innerHTML = '⚠ Lỗi — copy thủ công bằng Ctrl+A';
  });
}

// Load chat history vào help drawer

// Simple markdown → HTML, XSS-safe (escape trước rồi mới convert)
function renderMarkdown(text) {
  const escaped = String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
  // Inline code `code` → <code>
  let html = escaped.replace(/`([^`\n]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:0.92em;">$1</code>');
  // Bold **xxx** → <strong>
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Italic *xxx* → <em>  (chỉ match khi không phải bold)
  html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  // Bullet "- item" hoặc "* item" đầu dòng → <li>
  html = html.replace(/(^|<br>)\s*[-*]\s+(.+?)(?=<br>|$)/g, '$1• $2');
  // Newlines → <br>
  html = html.replace(/\n/g, '<br>');
  return html;
}

function appendChatBubble(role, text) {
  const container = document.querySelector('.help-messages');
  const div = document.createElement('div');
  div.className = 'help-msg ' + (role === 'user' ? 'user' : 'bot');
  div.style.cssText = role === 'user'
    ? 'background: var(--primary); color: white; padding: 10px 14px; border-radius: 14px 14px 4px 14px; margin-bottom: 12px; max-width: 85%; align-self: flex-end; font-size: 14px;'
    : 'background: var(--surface-2); padding: 10px 14px; border-radius: 14px 14px 14px 4px; margin-bottom: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; border-left: 3px solid var(--purple);';
  // User message → plain text. Bot message → markdown rendered.
  if (role === 'user') {
    div.textContent = text;
  } else {
    div.innerHTML = renderMarkdown(text);
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Send message in help drawer
async function sendChatMessage(message) {
  if (!message.trim()) return;

  appendChatBubble('user', message);
  appendChatHistory(lessonId, 'user', message);

  // Show typing indicator
  const container = document.querySelector('.help-messages');
  const typing = document.createElement('div');
  typing.id = 'typing';
  typing.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  typing.style.cssText = 'padding: 10px 14px; margin-bottom: 12px;';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;

  try {
    const profile = getProfile();
    const history = getChatHistory(lessonId).slice(-10); // 10 turn gần nhất
    const reply = await aiChat(message, {
      lessonId,
      lessonTitle: lesson.title,
      principleName: lesson.principle.name,
      currentStepTitle: lesson.steps[0].title, // step active hiện tại
      profile,
      history,
    });

    typing.remove();
    appendChatBubble('bot', reply);
    appendChatHistory(lessonId, 'model', reply);
  } catch (err) {
    typing.remove();
    const friendly =
      err.message?.includes('Failed to fetch') || err.message?.includes('NetworkError')
        ? '📡 Mất kết nối rồi. Bạn check Wifi xong gửi lại giúp tôi.'
        : err.message?.includes('quá 4 phút') || err.message?.includes('timeout')
        ? '⏳ Bridge của Lân đang offline hoặc bận. Bạn nhắn nhóm Zalo để Lân bật lại, rồi thử lại.'
        : err.message?.includes('Bridge báo lỗi')
        ? '⚠ Claude CLI gặp trục trặc tạm thời (có thể hết cap usage). Bạn đợi 2-3 phút rồi gửi lại.'
        : '❌ Lỗi: ' + (err.message || 'không rõ').slice(0, 100) + '. Bạn thử gửi lại giúp tôi.';
    appendChatBubble('bot', friendly);
    console.warn('[chat] error:', err.message);
  }
}

// Bind input
setTimeout(() => {
  const input = document.querySelector('.help-input textarea');
  const btn = document.querySelector('.help-input button');
  if (input && btn) {
    btn.onclick = () => {
      const msg = input.value;
      input.value = '';
      sendChatMessage(msg);
    };
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        btn.click();
      }
    });
  }
  // Bind quick prompts
  document.querySelectorAll('.help-quick .quick-btn').forEach(qb => {
    qb.onclick = () => sendChatMessage(qb.textContent.trim());
  });
}, 200);

function showNotif(text, color) {
  const stack = document.getElementById('liveNotifs');
  const div = document.createElement('div');
  div.className = 'live-notif';
  div.style.borderLeftColor = color;
  div.innerHTML = `<div class="live-ava">🔔</div><div>${text}</div>`;
  stack.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 300); }, 3500);
}

function confetti() {
  const colors = ['#f97316', '#2563eb', '#10b981', '#8b5cf6', '#ec4899', '#fbbf24'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

// ── AUTH GATE ─────────────────────────────────────────────────────────
// Bug fix: trước đây chưa login Firebase mà click "Nộp bài" chỉ hiện toast nhỏ
// → newbie miss. Giờ:
//   1) body[data-auth="out"] → CSS hiện banner cam inline ngay trên nút Nộp bài.
//   2) Lock nút submit (🔒, không click được).
//   3) auth-cta button → click avatar header để mở modal login (auth-ui.js wire sẵn).
function applyAuthGate(user) {
  const isIn = !!user;
  document.body.setAttribute('data-auth', isIn ? 'in' : 'out');
  document.querySelectorAll('.btn-submit').forEach(btn => {
    if (isIn) btn.removeAttribute('data-locked');
    else btn.setAttribute('data-locked', '1');
  });
}
applyAuthGate(null);
document.addEventListener('fb-ready', (e) => applyAuthGate(e.detail?.user || null));
document.addEventListener('click', (e) => {
  const cta = e.target.closest('.auth-required-banner .auth-cta');
  if (!cta) return;
  e.preventDefault();
  // Tìm avatar header bằng nhiều selector — auth-ui.js wire onclick động
  // tuỳ trang; cứ click avatar nào tìm được là mở modal/menu auth.
  const av = document.querySelector('#userAvatar, .user .avatar, .topbar .avatar, header .avatar');
  if (av && typeof av.click === 'function') av.click();
});
